PublicURL: http://127.0.0.1:8080
RestLogLevel: info

IrodsHost: localhost
IrodsPort: 1247
IrodsZone: tempZone
IrodsAdminUser: rods
IrodsAdminPassword: rods
IrodsAdminLoginType: native
IrodsAuthScheme: native
IrodsNegotiationPolicy: CS_NEG_DONT_CARE
IrodsSSLConfig:
