openapi: 3.0.3
info:
  title: iRODS REST API
  version: 0.1.0
  description: |
    REST-ful iRODS running on GoLang.
servers:
  - url: http://localhost:8080
tags:
  - name: health
  - name: path
  - name: user
  - name: ext
paths:
  /healthz:
    get:
      operationId: getHealth
      tags: [health]
      summary: Health probe
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/server:
    get:
      operationId: getServerInfo
      tags: [health]
      summary: Fetch iRODS server information
      description: |
        Returns iRODS server version details (similar to `miscsvrinfo`) plus
        service-side iRODS connection configuration details.
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        "200":
          description: Server information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInfoResponse"
        "403":
          description: Access denied while reading server information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/resource:
    get:
      operationId: getResources
      tags: [path]
      summary: List resource servers in the configured iRODS zone
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: scope
          required: false
          schema:
            type: string
            enum: [top, all]
            default: top
          description: |
            Resource listing scope. `top` is the default view intended for top-level
            resources. `all` returns the full visible flat resource set. The current
            backend resource model is flat, so these values are currently equivalent.
      responses:
        "200":
          description: Resource servers visible in the zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceCollectionResponse"
        "403":
          description: Access denied while listing resources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/resource/{resource_id}:
    get:
      operationId: getResource
      tags: [path]
      summary: Fetch details for one iRODS resource
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: resource_id
          required: true
          schema:
            type: string
          description: Resource identifier. This currently uses the iRODS resource name.
      responses:
        "200":
          description: Resource details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceResponse"
        "404":
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied while reading the resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/user:
    get:
      operationId: getUsers
      tags: [user]
      summary: List iRODS users
      description: |
        Lists visible iRODS user principals in the configured zone. When `prefix`
        is supplied for autocomplete-style search, it must be at least 3 characters.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: zone
          required: false
          schema:
            type: string
          description: iRODS zone to search. Defaults to the configured iRODS zone.
        - in: query
          name: type
          required: false
          schema:
            type: string
            enum: [rodsuser, rodsadmin]
          description: Optional user type filter.
        - in: query
          name: prefix
          required: false
          schema:
            type: string
            minLength: 3
          description: Optional username prefix filter for autocomplete.
      responses:
        "200":
          description: Users visible in the zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCollectionResponse"
        "400":
          description: Invalid user list option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied while listing users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: postUser
      tags: [user]
      summary: Create one iRODS user
      description: Requires the authenticated iRODS user to have type `rodsadmin` or `groupadmin`.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: zone
          required: false
          schema:
            type: string
          description: iRODS zone. Defaults to the configured iRODS zone.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Invalid create request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated iRODS user is not rodsadmin or groupadmin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/user/{user_name}:
    get:
      operationId: getUser
      tags: [user]
      summary: Fetch one iRODS user
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: user_name
          required: true
          schema:
            type: string
          description: iRODS username.
        - in: query
          name: zone
          required: false
          schema:
            type: string
          description: iRODS zone. Defaults to the configured iRODS zone.
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied while reading the user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: putUser
      tags: [user]
      summary: Update one iRODS user
      description: Requires the authenticated iRODS user to have type `rodsadmin`.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: user_name
          required: true
          schema:
            type: string
          description: iRODS username.
        - in: query
          name: zone
          required: false
          schema:
            type: string
          description: iRODS zone. Defaults to the configured iRODS zone.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Invalid update request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated iRODS user is not rodsadmin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteUser
      tags: [user]
      summary: Delete one iRODS user
      description: Requires the authenticated iRODS user to have type `rodsadmin` or `groupadmin`.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: user_name
          required: true
          schema:
            type: string
          description: iRODS username.
        - in: query
          name: zone
          required: false
          schema:
            type: string
          description: iRODS zone. Defaults to the configured iRODS zone.
      responses:
        "204":
          description: User deleted
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated iRODS user is not rodsadmin or groupadmin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/usergroup:
    get:
      operationId: getUserGroups
      tags: [user]
      summary: List iRODS groups
      description: |
        Lists visible iRODS groups in the configured zone. When `prefix`
        is supplied for autocomplete-style search, it must be at least 3 characters.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: zone
          required: false
          schema:
            type: string
          description: iRODS zone to search. Defaults to the configured iRODS zone.
        - in: query
          name: prefix
          required: false
          schema:
            type: string
            minLength: 3
          description: Optional group-name prefix filter for autocomplete.
      responses:
        "200":
          description: Groups visible in the zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGroupCollectionResponse"
        "400":
          description: Invalid group list option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied while listing groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: postUserGroup
      tags: [user]
      summary: Create one iRODS group
      description: Requires the authenticated iRODS user to have type `rodsadmin` or `groupadmin`.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: zone
          required: false
          schema:
            type: string
          description: iRODS zone. Defaults to the configured iRODS zone.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserGroupCreateRequest"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGroupResponse"
        "400":
          description: Invalid create request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Group already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated iRODS user is not rodsadmin or groupadmin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/usergroup/{group_name}:
    get:
      operationId: getUserGroup
      tags: [user]
      summary: Fetch one iRODS group with members
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: group_name
          required: true
          schema:
            type: string
          description: iRODS group name.
        - in: query
          name: zone
          required: false
          schema:
            type: string
          description: iRODS zone. Defaults to the configured iRODS zone.
      responses:
        "200":
          description: Group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGroupResponse"
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied while reading the group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteUserGroup
      tags: [user]
      summary: Delete one iRODS group
      description: Requires the authenticated iRODS user to have type `rodsadmin` or `groupadmin`.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: group_name
          required: true
          schema:
            type: string
          description: iRODS group name.
        - in: query
          name: zone
          required: false
          schema:
            type: string
          description: iRODS zone. Defaults to the configured iRODS zone.
      responses:
        "204":
          description: Group deleted
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated iRODS user is not rodsadmin or groupadmin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/usergroup/{group_name}/member:
    post:
      operationId: postUserGroupMember
      tags: [user]
      summary: Add one user to an iRODS group
      description: Requires the authenticated iRODS user to have type `rodsadmin` or `groupadmin`.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: group_name
          required: true
          schema:
            type: string
          description: iRODS group name.
        - in: query
          name: zone
          required: false
          schema:
            type: string
          description: iRODS zone. Defaults to the configured iRODS zone.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserGroupMemberRequest"
      responses:
        "200":
          description: Group membership updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGroupResponse"
        "400":
          description: Invalid member request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Group or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated iRODS user is not rodsadmin or groupadmin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/usergroup/{group_name}/member/{user_name}:
    delete:
      operationId: deleteUserGroupMember
      tags: [user]
      summary: Remove one user from an iRODS group
      description: Requires the authenticated iRODS user to have type `rodsadmin` or `groupadmin`.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: group_name
          required: true
          schema:
            type: string
          description: iRODS group name.
        - in: path
          name: user_name
          required: true
          schema:
            type: string
          description: iRODS username to remove from the group.
        - in: query
          name: zone
          required: false
          schema:
            type: string
          description: iRODS zone. Defaults to the configured iRODS zone.
      responses:
        "200":
          description: Group membership updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGroupResponse"
        "404":
          description: Group or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated iRODS user is not rodsadmin or groupadmin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/path:
    get:
      operationId: getPath
      tags: [path]
      summary: Fetch metadata for an iRODS logical path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a file or collection.
        - in: query
          name: verbose
          required: false
          schema:
            type: string
          description: |
            Optional verbosity level for replica details on data objects.
            `1`, `true`, or `long` includes `ils -l` style replica information.
            `2` or `very_long` includes `ils -L` style checksum, data type, and physical path details.
      responses:
        "200":
          description: Metadata for a file or collection path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathEntry"
        "400":
          description: Missing irods_path query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: postPath
      tags: [path]
      summary: Create a collection or zero-byte data object under a parent collection
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to the parent collection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathChildCreateRequest"
      responses:
        "201":
          description: Created collection or data object metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathEntry"
        "400":
          description: Missing path or invalid create request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Parent collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: patchPath
      tags: [path]
      summary: Move or copy a file or collection path
      description: |
        Supports path mutation operations:
        - rename within the same parent via `new_name` (defaults to `move`)
        - move to an absolute `destination_path`
        - copy to an absolute `destination_path`
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to the existing file or collection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathMoveRequest"
      responses:
        "200":
          description: Metadata for the moved or copied path at its destination location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathEntry"
        "400":
          description: Missing path or invalid rename request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Path not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePath
      tags: [path]
      summary: Delete a data object or collection path
      description: |
        Deletes the path identified by `irods_path`.
        Collections must be empty unless `force=true`, which performs a recursive delete.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a file or collection.
        - in: query
          name: force
          required: false
          schema:
            type: boolean
            default: false
          description: When `true`, bypass the empty-collection check and recursively delete collections.
      responses:
        "204":
          description: Path deleted
        "400":
          description: Missing path or invalid force query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Path not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Collection is not empty and force was not supplied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/path/children:
    get:
      operationId: getPathChildren
      tags: [path]
      summary: List direct children for a collection path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a collection.
        - in: query
          name: name_pattern
          required: false
          schema:
            type: string
          description: Optional wildcard pattern. For `children` and `subtree` scopes the pattern is matched against child basenames and leading `/` is ignored.
        - in: query
          name: search_scope
          required: false
          schema:
            type: string
            enum: [children, subtree, absolute]
            default: children
          description: Search scope. `children` searches direct children, `subtree` searches descendants under `irods_path`, `absolute` performs full-path matching across the zone tree.
        - in: query
          name: case_sensitive
          required: false
          schema:
            type: boolean
            default: true
          description: Controls wildcard match case sensitivity.
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [path, name, kind, size, created_at, updated_at]
          description: Optional sort field for matched results.
        - in: query
          name: order
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Optional sort order for matched results.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
          description: Optional maximum number of child entries to return.
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
          description: Optional number of matched entries to skip before returning results.
      responses:
        "200":
          description: Collection children
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathChildrenResponse"
        "400":
