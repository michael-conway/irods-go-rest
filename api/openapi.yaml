openapi: 3.0.3
info:
  title: iRODS REST API
  version: 0.1.0
  description: |
    REST-ful iRODS running on GoLang.
servers:
  - url: http://localhost:8080
tags:
  - name: health
  - name: objects
  - name: data-objects
  - name: collections
paths:
  /healthz:
    get:
      operationId: getHealth
      tags: [health]
      summary: Health probe
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/objects/{object_id}:
    get:
      operationId: getObject
      tags: [objects]
      summary: Fetch object metadata from iRODS
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: object_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Object"
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/data-objects/by-path:
    get:
      operationId: getObjectByPath
      tags: [data-objects]
      summary: Fetch data object metadata from an iRODS absolute path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
          description: Full iRODS absolute path to the data object.
      responses:
        "200":
          description: Object metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Object"
        "400":
          description: Missing path query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/data-objects/content:
    head:
      operationId: headObjectContentByPath
      tags: [data-objects]
      summary: Inspect content headers for an iRODS data object
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
          description: Full iRODS absolute path to the data object.
        - in: header
          name: Range
          required: false
          schema:
            type: string
          description: Optional byte range request in RFC 9110 format, currently single-range only.
      responses:
        "200":
          description: Content headers for the full object
        "206":
          description: Content headers for a byte range
        "400":
          description: Missing path query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "416":
          description: Invalid byte range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: getObjectContentByPath
      tags: [data-objects]
      summary: Stream bytes for an iRODS data object
      description: |
        Accepts Basic auth, an OAuth bearer token, or a bearer token prefixed as `irods-ticket:<ticket>`.
        Supports single-range byte restarts via the `Range` header.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
          description: Full iRODS absolute path to the data object.
        - in: header
          name: Range
          required: false
          schema:
            type: string
          description: Optional byte range request in RFC 9110 format, currently single-range only.
      responses:
        "200":
          description: Full object bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: Partial object bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          description: Missing path query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "416":
          description: Invalid byte range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/collections/{collection_id}:
    get:
      operationId: getCollection
      tags: [collections]
      summary: Fetch collection metadata from iRODS
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: collection_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Collection metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
        "404":
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    HealthResponse:
      type: object
      required: [status, service, environment]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: iRODS REST API
        environment:
          type: string
          example: development
    Object:
      type: object
      required: [id, path, checksum, size, zone]
      properties:
        id:
          type: string
        path:
          type: string
        checksum:
          type: string
        size:
          type: integer
          format: int64
        zone:
          type: string
        resource:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    Collection:
      type: object
      required: [id, path, zone]
      properties:
        id:
          type: string
        path:
          type: string
        zone:
          type: string
        childCount:
          type: integer
          format: int32
        metadata:
          type: object
          additionalProperties:
            type: string
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
