            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Path not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/ticket/{ticket_name}:
    get:
      operationId: getTicket
      tags: [ticket]
      summary: Show one ticket by ticket name
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: ticket_name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "401":
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: patchTicket
      tags: [ticket]
      summary: Update mutable ticket restrictions
      description: |
        `maximum_uses: 0` clears the use limit.
        `lifetime_minutes: 0` clears the expiration time.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: ticket_name
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketUpdateRequest"
      responses:
        "200":
          description: Ticket updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "400":
          description: Invalid request body or parameter values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteTicket
      tags: [ticket]
      summary: Delete a ticket by ticket name
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: ticket_name
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Ticket deleted
        "401":
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    HealthResponse:
      type: object
      required: [status, service, environment]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: iRODS REST API
        environment:
          type: string
          example: development
    ServerInfo:
      type: object
      properties:
        release_version:
          type: string
          description: iRODS release version (for example `rods4.3.2`).
        api_version:
          type: string
          description: iRODS API compatibility version identifier.
        reconnect_port:
          type: integer
        reconnect_addr:
          type: string
        cookie:
          type: integer
        irods_host:
          type: string
          description: Configured iRODS hostname for this REST service.
        irods_port:
          type: integer
        irods_zone:
          type: string
        irods_negotiation:
          type: string
          description: Configured iRODS negotiation policy for this REST service.
        irods_default_resource:
          type: string
        resource_affinity:
          type: array
          items:
            type: string
          description: Optional configured list of resources proximate to this service.
    ServerInfoResponse:
      type: object
      required: [server_info]
      properties:
        server_info:
          $ref: "#/components/schemas/ServerInfo"
    PathEntry:
      type: object
      required: [id, path, kind, zone, path_segments]
      properties:
        id:
          type: string
        path:
          type: string
        kind:
          type: string
          enum: [data_object, collection]
        cmd_cue:
          $ref: "#/components/schemas/CmdCue"
        links:
          $ref: "#/components/schemas/PathLinks"
        parent:
          $ref: "#/components/schemas/ParentLink"
        path_segments:
          type: array
          description: Ordered collection path segments for the path resource, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        hasChildren:
          type: boolean
        childCount:
          type: integer
          format: int32
        checksum:
          $ref: "#/components/schemas/PathChecksum"
        mime_type:
          type: string
          description: Inferred MIME type for a data object, based on the logical path extension.
        size:
          type: integer
          format: int64
        display_size:
          type: string
          description: Human-readable size formatted automatically as B, KB, MB, or GB.
        zone:
          type: string
        resource:
          type: string
        resource_link:
          $ref: "#/components/schemas/ActionLink"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        replicas:
          type: array
          items:
            $ref: "#/components/schemas/PathReplica"
        metadata:
          type: object
          additionalProperties:
            type: string
    PathReplica:
      type: object
      required: [number]
      properties:
        number:
          type: integer
          format: int64
        owner:
          type: string
        resource_name:
          type: string
        resource_link:
          $ref: "#/components/schemas/ActionLink"
        resource_hierarchy:
          type: string
        size:
          type: integer
          format: int64
        display_size:
          type: string
        updated_at:
          type: string
          format: date-time
        status:
          type: string
          description: Raw iRODS replica status value.
        status_symbol:
          type: string
          description: ils-style replica status indicator such as `&`, `X`, or `?`.
        status_description:
          type: string
          description: Human-readable interpretation of the replica status.
        checksum:
          type: string
        data_type:
          type: string
        physical_path:
          type: string
    CmdCue:
      type: object
      properties:
        operation:
          type: string
          enum: [put, get]
        gocmd:
          type: string
        icommand:
          type: string
    PathLinks:
      type: object
      properties:
        avus:
          $ref: "#/components/schemas/ActionLink"
        acls:
          $ref: "#/components/schemas/ActionLink"
        create_avu:
          $ref: "#/components/schemas/ActionLink"
        create_ticket:
          $ref: "#/components/schemas/ActionLink"
        resources:
          $ref: "#/components/schemas/ActionLink"
        create_child_collection:
          $ref: "#/components/schemas/ActionLink"
        create_child_data_object:
          $ref: "#/components/schemas/ActionLink"
        set_inheritance:
          $ref: "#/components/schemas/ActionLink"
        delete_inheritance:
          $ref: "#/components/schemas/ActionLink"
    ParentLink:
      type: object
      required: [irods_path, href]
      properties:
        irods_path:
          type: string
        href:
          type: string
    PathChildrenResponse:
      type: object
      required: [irods_path, path_segments, children]
      properties:
        irods_path:
          type: string
        path_segments:
          type: array
          description: Ordered collection path segments for the requested collection, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        children:
          type: array
          items:
            $ref: "#/components/schemas/PathEntry"
    PathACLResponse:
      type: object
      required: [irods_path, kind, path_segments, users, groups]
      properties:
        irods_path:
          type: string
        kind:
          type: string
          enum: [data_object, collection]
        inheritance_enabled:
          type: boolean
          description: Collection-only inheritance setting when available.
        path_segments:
          type: array
          description: Ordered collection path segments for the requested path, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        links:
          $ref: "#/components/schemas/PathACLLinks"
        users:
          type: array
          items:
            $ref: "#/components/schemas/PathACLEntry"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/PathACLEntry"
    PathACLLinks:
      type: object
      properties:
        path:
          $ref: "#/components/schemas/ActionLink"
        add_user:
          $ref: "#/components/schemas/ActionLink"
        set_inheritance:
          $ref: "#/components/schemas/ActionLink"
    PathACLEntry:
      type: object
      required: [id, name, type, access_level]
      properties:
        id:
          type: string
          description: Stable ACL entry identifier for follow-up update or remove links.
        name:
          type: string
          description: iRODS user or group name.
        zone:
          type: string
          description: iRODS zone for the user or group when supplied by iRODS.
        type:
          type: string
          enum: [user, group]
          description: Principal kind derived from the iRODS user type.
        irods_user_type:
          type: string
          description: Raw iRODS user type returned with the ACL entry.
        access_level:
          type: string
          description: Raw iRODS access level for the path.
        links:
          $ref: "#/components/schemas/PathACLItemLinks"
    PathACLItemLinks:
      type: object
      properties:
        update:
          $ref: "#/components/schemas/ActionLink"
        remove:
          $ref: "#/components/schemas/ActionLink"
    PathACLCreateRequest:
      type: object
      required: [name, access_level]
      properties:
        name:
          type: string
          description: iRODS user or group principal name.
        zone:
          type: string
          description: iRODS zone for the principal. Defaults to configured zone.
        type:
          type: string
          enum: [user, group]
          description: Principal kind. Defaults to `user`.
        access_level:
          type: string
          description: Target iRODS ACL access level.
        recursive:
          type: boolean
          default: false
          description: Apply ACL change recursively when target path is a collection.
    PathACLUpdateRequest:
      type: object
      required: [access_level]
      properties:
        access_level:
          type: string
          description: Target iRODS ACL access level.
        recursive:
          type: boolean
          default: false
          description: Apply ACL change recursively when target path is a collection.
    PathACLInheritanceUpdateRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: When true enables inheritance, when false disables inheritance.
        recursive:
          type: boolean
          default: false
          description: Apply inheritance toggle recursively to nested collections.
    PathACLEntryResponse:
      type: object
      required: [irods_path, acl]
      properties:
        irods_path:
          type: string
        acl:
          $ref: "#/components/schemas/PathACLEntry"
    PathAVUResponse:
      type: object
      required: [irods_path, path_segments, avus]
      properties:
        irods_path:
          type: string
        path_segments:
          type: array
          description: Ordered collection path segments for the requested path, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        links:
          $ref: "#/components/schemas/PathLinks"
        avus:
          type: array
          items:
            $ref: "#/components/schemas/AVUMetadata"
        count:
          type: integer
          description: Number of AVUs returned after filtering and pagination.
        total:
          type: integer
          description: Number of AVUs matching the filter before pagination.
        offset:
          type: integer
          description: Number of matching AVUs skipped before returning results.
        limit:
          type: integer
          description: Requested page size, or 0 when no limit was requested.
    PathAVUSingleResponse:
      type: object
      required: [irods_path, path_segments, avu]
      properties:
        irods_path:
          type: string
        path_segments:
          type: array
          description: Ordered collection path segments for the requested path, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        avu:
          $ref: "#/components/schemas/AVUMetadata"
    PathChildCreateRequest:
      type: object
      required: [child_name, kind]
      properties:
        child_name:
          type: string
          description: Relative child name or relative nested path to create under the parent collection.
        kind:
          type: string
          enum: [collection, data_object]
        mkdirs:
          type: boolean
          default: false
          description: When `true`, create intermediate collection segments for collection creation.
    PathMoveRequest:
      type: object
      required: [new_name]
      properties:
        new_name:
          type: string
          description: New basename for the file or collection within the same parent collection.
    PathAVUCreateRequest:
      type: object
      required: [attrib, value]
      properties:
        attrib:
          type: string
        value:
          type: string
        unit:
          type: string
    PathChecksum:
      type: object
      properties:
        checksum:
          type: string
        type:
          type: string
          description: Checksum type prefix such as `sha2` or `md5`.
    PathChecksumResponse:
      type: object
      required: [irods_path, path_segments]
      properties:
        irods_path:
          type: string
        path_segments:
          type: array
          description: Ordered collection path segments for the requested data object, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        checksum:
          type: string
        type:
          type: string
          description: Checksum type prefix such as `sha2` or `md5`.
    AVUMetadata:
      type: object
      required: [id, attrib, value]
      properties:
        id:
          type: string
          description: Generic identifier for the AVU row as returned by iRODS.
        attrib:
          type: string
          description: AVU attribute name.
        value:
          type: string
          description: AVU value.
        unit:
          type: string
          description: Optional AVU units value.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        links:
          $ref: "#/components/schemas/AVULinks"
    AVULinks:
      type: object
      properties:
        update:
          $ref: "#/components/schemas/ActionLink"
        delete:
          $ref: "#/components/schemas/ActionLink"
    ActionLink:
      type: object
      required: [href]
      properties:
        href:
          type: string
        method:
          type: string
    PathSegmentLink:
      type: object
      required: [display_name, irods_path, href]
      properties:
        display_name:
          type: string
          description: Human-readable segment name for one level of the collection path.
        irods_path:
          type: string
          description: Canonical iRODS path up to this segment.
        href:
          type: string
          description: Relative REST link for displaying this collection level.
    PathContentsUploadRequest:
      type: object
      required: [parent_path, file_name, content]
      properties:
        parent_path:
          type: string
          description: Absolute iRODS collection path that will contain the uploaded object.
          example: /tempZone/home/alice/project
        file_name:
          type: string
          description: Target data object name within `parent_path`.
          example: sample.fastq.gz
        content:
          type: string
          format: binary
          description: Complete binary payload for the uploaded object.
        checksum:
          type: boolean
          default: false
          description: |
            When true, request checksum calculation or verification during upload.
            Future implementations may apply per-user saved defaults when this field
            is omitted, but explicit request values override saved defaults.
        overwrite:
          type: boolean
          default: false
          description: |
            When true, allow replacement of an existing object at the resolved path.
            Future implementations may apply per-user saved defaults when this field
            is omitted, but explicit request values override saved defaults.
    PathContentsUploadResponse:
      type: object
      required: [path, parent_path, file_name, action, size, links]
      properties:
        path:
          type: string
          description: Resolved canonical iRODS object path.
          example: /tempZone/home/alice/project/sample.fastq.gz
        parent_path:
          type: string
          description: Canonical parent collection path that received the uploaded object.
          example: /tempZone/home/alice/project
        file_name:
          type: string
          description: Uploaded data object name.
          example: sample.fastq.gz
        action:
          type: string
          enum: [created, replaced]
          description: Indicates whether the upload created a new object or replaced an existing object.
        size:
          type: integer
          format: int64
          description: Uploaded object size in bytes.
        checksum:
          $ref: "#/components/schemas/UploadChecksumInfo"
        links:
          $ref: "#/components/schemas/PathContentsUploadLinks"
    UploadChecksumInfo:
      type: object
      required: [requested, verified]
      properties:
        requested:
          type: boolean
          description: True when the request explicitly asked for checksum handling.
        verified:
          type: boolean
          description: True when checksum processing was completed by the server.
        algorithm:
          type: string
          description: Checksum algorithm used by the server when checksum processing was completed.
          example: sha2
        value:
          type: string
          description: Calculated or verified checksum value.
          example: 9d4e1e23bd5b727046a9e3b4b7db57bd8d6ee684
    PathContentsUploadLinks:
      type: object
      required: [path, contents, parent]
      properties:
        path:
          $ref: "#/components/schemas/ResourceLink"
        contents:
          $ref: "#/components/schemas/ResourceLink"
        parent:
          $ref: "#/components/schemas/ResourceLink"
    ResourceLink:
      type: object
      required: [href]
      properties:
        href:
          type: string
          description: Relative REST link for the related resource.
    Resource:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        zone:
          type: string
        type:
          type: string
        class:
          type: string
        location:
          type: string
        path:
          type: string
        context:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        links:
          $ref: "#/components/schemas/ResourceLinks"
    ResourceLinks:
      type: object
      properties:
        self:
          $ref: "#/components/schemas/ActionLink"
    ResourceResponse:
      type: object
      required: [resource]
      properties:
        resource:
          $ref: "#/components/schemas/Resource"
    ResourceCollectionResponse:
      type: object
      required: [resources, count, scope, links]
      properties:
        resources:
          type: array
          items:
            $ref: "#/components/schemas/Resource"
        count:
          type: integer
        scope:
          type: string
          enum: [top, all]
        links:
          type: object
          properties:
            self:
              $ref: "#/components/schemas/ActionLink"
    User:
      type: object
      required: [id, name, zone, type]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        zone:
          type: string
        type:
          type: string
          enum: [rodsuser, rodsadmin]
        links:
          $ref: "#/components/schemas/UserLinks"
    UserLinks:
      type: object
      properties:
        self:
          $ref: "#/components/schemas/ActionLink"
        update:
          $ref: "#/components/schemas/ActionLink"
        delete:
          $ref: "#/components/schemas/ActionLink"
    UserResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"
    UserCollectionResponse:
      type: object
      required: [users, count, zone, links]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        count:
          type: integer
        zone:
          type: string
        type:
          type: string
          enum: [rodsuser, rodsadmin]
        prefix:
          type: string
        links:
          type: object
          properties:
            self:
              $ref: "#/components/schemas/ActionLink"
            create:
              $ref: "#/components/schemas/ActionLink"
    UserCreateRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          description: iRODS username to create.
        type:
          type: string
          enum: [rodsuser, rodsadmin]
          description: iRODS user type for the new user.
        password:
          type: string
          format: password
          description: Optional initial iRODS user password.
    UserUpdateRequest:
      type: object
      description: At least one of `type` or `password` is required.
      properties:
        type:
          type: string
          enum: [rodsuser, rodsadmin]
          description: New iRODS user type.
        password:
          type: string
          format: password
          description: New iRODS user password.
    UserGroup:
      type: object
      required: [id, name, zone, type]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        zone:
          type: string
        type:
          type: string
          enum: [rodsgroup]
        members:
          type: array
          items:
            $ref: "#/components/schemas/UserGroupMember"
        links:
          $ref: "#/components/schemas/UserGroupLinks"
    UserGroupMember:
      type: object
      required: [id, name, zone, type]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        zone:
          type: string
        type:
          type: string
          enum: [rodsuser, rodsadmin, groupadmin]
        links:
          $ref: "#/components/schemas/UserGroupMemberLinks"
    UserGroupLinks:
      type: object
      properties:
        self:
          $ref: "#/components/schemas/ActionLink"
        delete:
          $ref: "#/components/schemas/ActionLink"
        add_member:
          $ref: "#/components/schemas/ActionLink"
    UserGroupMemberLinks:
      type: object
      properties:
        self:
          $ref: "#/components/schemas/ActionLink"
        remove_from_group:
          $ref: "#/components/schemas/ActionLink"
    UserGroupResponse:
      type: object
      required: [group]
      properties:
        group:
          $ref: "#/components/schemas/UserGroup"
    UserGroupCollectionResponse:
      type: object
      required: [groups, count, zone, links]
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/UserGroup"
        count:
          type: integer
        zone:
          type: string
        prefix:
          type: string
        links:
          type: object
          properties:
            self:
              $ref: "#/components/schemas/ActionLink"
            create:
              $ref: "#/components/schemas/ActionLink"
    UserGroupCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: iRODS group name to create.
    UserGroupMemberRequest:
      type: object
      required: [user_name]
      properties:
        user_name:
          type: string
          description: iRODS username to add to the group.
    Ticket:
      type: object
      required: [name]
      properties:
        name:
          type: string
        bearer_token:
          type: string
        type:
          type: string
        owner:
          type: string
        owner_zone:
          type: string
        object_type:
          type: string
        irods_path:
          type: string
        uses_limit:
          type: integer
          format: int64
        uses_count:
          type: integer
          format: int64
        write_file_limit:
          type: integer
          format: int64
        write_file_count:
          type: integer
          format: int64
        write_byte_limit:
          type: integer
          format: int64
        write_byte_count:
          type: integer
          format: int64
        expiration_time:
          type: string
          format: date-time
        links:
          $ref: "#/components/schemas/TicketLinks"
    TicketLinks:
      type: object
      properties:
        self:
          $ref: "#/components/schemas/ActionLink"
        update:
          $ref: "#/components/schemas/ActionLink"
        delete:
          $ref: "#/components/schemas/ActionLink"
        path:
          $ref: "#/components/schemas/ActionLink"
        download:
          $ref: "#/components/schemas/ActionLink"
    TicketCreateRequest:
      type: object
      properties:
        maximum_uses:
          type: integer
          format: int64
          minimum: 0
        lifetime_minutes:
          type: integer
          minimum: 0
    TicketUpdateRequest:
      type: object
      properties:
        maximum_uses:
          type: integer
          format: int64
          minimum: 0
        lifetime_minutes:
          type: integer
          minimum: 0
