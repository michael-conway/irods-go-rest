openapi: 3.0.3
info:
  title: iRODS REST API
  version: 0.1.0
  description: |
    REST-ful iRODS running on GoLang.
servers:
  - url: http://localhost:8080
tags:
  - name: health
  - name: path
paths:
  /healthz:
    get:
      operationId: getHealth
      tags: [health]
      summary: Health probe
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/path:
    get:
      operationId: getPath
      tags: [path]
      summary: Fetch metadata for an iRODS logical path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a file or collection.
      responses:
        "200":
          description: Metadata for a file or collection path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathEntry"
        "400":
          description: Missing irods_path query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/path/children:
    get:
      operationId: getPathChildren
      tags: [path]
      summary: List direct children for a collection path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a collection.
      responses:
        "200":
          description: Collection children
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathChildrenResponse"
        "400":
          description: Missing irods_path query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Path not found or not a collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/path/contents:
    head:
      operationId: headPathContents
      tags: [path]
      summary: Inspect content headers for bytes at an iRODS logical path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a file.
        - in: header
          name: Range
          required: false
          schema:
            type: string
          description: Optional byte range request in RFC 9110 format, currently single-range only.
      responses:
        "200":
          description: Content headers for the full object
        "206":
          description: Content headers for a byte range
        "400":
          description: Missing irods_path query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "416":
          description: Invalid byte range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: getPathContents
      tags: [path]
      summary: Stream bytes for an iRODS logical path
      description: |
        Accepts Basic auth, an OAuth bearer token, or a bearer token prefixed as `irods-ticket:<ticket>`.
        Supports single-range byte restarts via the `Range` header.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a file.
        - in: header
          name: Range
          required: false
          schema:
            type: string
          description: Optional byte range request in RFC 9110 format, currently single-range only.
      responses:
        "200":
          description: Full object bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: Partial object bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          description: Missing irods_path query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "416":
          description: Invalid byte range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    HealthResponse:
      type: object
      required: [status, service, environment]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: iRODS REST API
        environment:
          type: string
          example: development
    PathEntry:
      type: object
      required: [id, path, kind, zone]
      properties:
        id:
          type: string
        path:
          type: string
        kind:
          type: string
          enum: [data_object, collection]
        parent:
          $ref: "#/components/schemas/ParentLink"
        hasChildren:
          type: boolean
        childCount:
          type: integer
          format: int32
        checksum:
          type: string
        size:
          type: integer
          format: int64
        zone:
          type: string
        resource:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    ParentLink:
      type: object
      required: [irods_path, href]
      properties:
        irods_path:
          type: string
        href:
          type: string
    PathChildrenResponse:
      type: object
      required: [irods_path, children]
      properties:
        irods_path:
          type: string
        children:
          type: array
          items:
            $ref: "#/components/schemas/PathEntry"
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
