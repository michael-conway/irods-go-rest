        "200":
          description: Bucket name updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/S3BucketResponse"
        "400":
          description: Invalid bucket request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied while updating bucket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Bucket name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: S3 bucket administration is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/ext/s3/buckets/refresh-mapping:
    post:
      operationId: postExtS3BucketMappingRefresh
      tags: [ext]
      summary: Temporarily rebuild the iRODS S3 API bucket mapping file
      description: Temporary administration endpoint that wipes and rewrites the configured bucket mapping JSON file from current iRODS:S3:Bucket AVUs.
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        "200":
          description: Bucket mapping file rebuilt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/S3BucketMappingRefreshResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied while refreshing bucket mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Duplicate bucket AVUs prevent rebuilding the mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: S3 bucket administration is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/ext/s3/buckets/by-path:
    get:
      operationId: getExtS3BucketByPath
      tags: [ext]
      summary: Get an iRODS S3 API bucket by collection path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Absolute iRODS collection path.
      responses:
        "200":
          description: Bucket assigned to the requested collection path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/S3BucketResponse"
        "400":
          description: Invalid bucket path request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied while reading bucket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Bucket not found for requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: S3 bucket administration is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/ext/s3/buckets/{bucket_id}:
    get:
      operationId: getExtS3Bucket
      tags: [ext]
      summary: Get an iRODS S3 API bucket by bucket id
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: bucket_id
          required: true
          schema:
            type: string
          description: Bucket name stored in the iRODS:S3:Bucket AVU.
        - in: query
          name: irods_path
          required: false
          schema:
            type: string
          description: Optional absolute iRODS collection path used to scope lookup.
        - in: query
          name: recursive
          required: false
          schema:
            type: boolean
            default: true
          description: Whether irods_path scoping includes nested collections.
      responses:
        "200":
          description: Bucket matching the requested bucket id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/S3BucketResponse"
        "400":
          description: Invalid bucket lookup request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied while reading bucket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Bucket not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: S3 bucket administration is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteExtS3Bucket
      tags: [ext]
      summary: Remove an iRODS S3 API bucket assignment
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: bucket_id
          required: true
          schema:
            type: string
          description: Bucket name stored in the iRODS:S3:Bucket AVU.
      responses:
        "204":
          description: Bucket assignment removed
        "400":
          description: Invalid bucket delete request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied while removing bucket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Bucket not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: S3 bucket administration is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    HealthResponse:
      type: object
      required: [status, service, environment]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: iRODS REST API
        environment:
          type: string
          example: development
    ServerInfo:
      type: object
      properties:
        release_version:
          type: string
          description: iRODS release version (for example `rods4.3.2`).
        api_version:
          type: string
          description: iRODS API compatibility version identifier.
        reconnect_port:
          type: integer
        reconnect_addr:
          type: string
        cookie:
          type: integer
        irods_host:
          type: string
          description: Configured iRODS hostname for this REST service.
        irods_port:
          type: integer
        irods_zone:
          type: string
        irods_negotiation:
          type: string
          enum: [CS_NEG_REFUSE, CS_NEG_REQUIRE, CS_NEG_DONT_CARE]
          description: Configured iRODS negotiation policy for this REST service.
        irods_default_resource:
          type: string
        resource_affinity:
          type: array
          items:
            type: string
          description: Optional configured list of resources proximate to this service.
    ServerInfoResponse:
      type: object
      required: [server_info]
      properties:
        server_info:
          $ref: "#/components/schemas/ServerInfo"
    PathEntry:
      type: object
      required: [id, path, kind, zone, path_segments]
      properties:
        id:
          type: string
        path:
          type: string
        kind:
          type: string
          enum: [data_object, collection]
        cmd_cues:
          type: array
          items:
            $ref: "#/components/schemas/CmdCue"
        links:
          $ref: "#/components/schemas/PathLinks"
        path_segments:
          type: array
          description: Ordered collection path segments for the path resource, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        hasChildren:
          type: boolean
        childCount:
          type: integer
          format: int32
        checksum:
          $ref: "#/components/schemas/PathChecksum"
        mime_type:
          type: string
          description: Inferred MIME type for a data object, based on the logical path extension.
        size:
          type: integer
          format: int64
        display_size:
          type: string
          description: Human-readable size formatted automatically as B, KB, MB, or GB.
        zone:
          type: string
        resource:
          type: string
        resource_link:
          $ref: "#/components/schemas/ActionLink"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        replicas:
          type: array
          items:
            $ref: "#/components/schemas/PathReplica"
        metadata:
          type: object
          additionalProperties:
            type: string
    PathReplica:
      type: object
      required: [number]
      properties:
        number:
          type: integer
          format: int64
        owner:
          type: string
        resource_name:
          type: string
        resource_link:
          $ref: "#/components/schemas/ActionLink"
        links:
          $ref: "#/components/schemas/PathReplicaLinks"
        resource_hierarchy:
          type: string
        size:
          type: integer
          format: int64
        display_size:
          type: string
        updated_at:
          type: string
          format: date-time
        status:
          type: string
          description: Raw iRODS replica status value.
        status_symbol:
          type: string
          description: ils-style replica status indicator such as `&`, `X`, or `?`.
        status_description:
          type: string
          description: Human-readable interpretation of the replica status.
        checksum:
          type: string
        data_type:
          type: string
        physical_path:
          type: string
    CmdCue:
      type: object
      properties:
        operation:
          type: string
          enum: [put, get, phymove, replicate]
        gocmd:
          type: string
        icommand:
          type: string
    PathLinks:
      type: object
      properties:
        self:
          $ref: "#/components/schemas/ActionLink"
        parent:
          $ref: "#/components/schemas/ActionLink"
        children:
          $ref: "#/components/schemas/ActionLink"
        details:
          $ref: "#/components/schemas/ActionLink"
        update:
          $ref: "#/components/schemas/ActionLink"
        delete:
          $ref: "#/components/schemas/ActionLink"
        relocate:
          $ref: "#/components/schemas/ActionLink"
        move:
          $ref: "#/components/schemas/ActionLink"
        copy:
          $ref: "#/components/schemas/ActionLink"
        upload_contents:
          $ref: "#/components/schemas/ActionLink"
        replace_contents:
          $ref: "#/components/schemas/ActionLink"
        download_contents:
          $ref: "#/components/schemas/ActionLink"
        next:
          $ref: "#/components/schemas/ActionLink"
        prev:
          $ref: "#/components/schemas/ActionLink"
        add_replica:
          $ref: "#/components/schemas/ActionLink"
        move_replica:
          $ref: "#/components/schemas/ActionLink"
        trim_replica:
          $ref: "#/components/schemas/ActionLink"
        avus:
          $ref: "#/components/schemas/ActionLink"
        acls:
          $ref: "#/components/schemas/ActionLink"
        replicas:
          $ref: "#/components/schemas/ActionLink"
        create_avu:
          $ref: "#/components/schemas/ActionLink"
        create_ticket:
          $ref: "#/components/schemas/ActionLink"
        resources:
          $ref: "#/components/schemas/ActionLink"
        create_child_collection:
          $ref: "#/components/schemas/ActionLink"
        create_child_data_object:
          $ref: "#/components/schemas/ActionLink"
        set_inheritance:
          $ref: "#/components/schemas/ActionLink"
        delete_inheritance:
          $ref: "#/components/schemas/ActionLink"
    PathChildrenLinks:
      type: object
      properties:
        self:
          $ref: "#/components/schemas/ActionLink"
        parent:
          $ref: "#/components/schemas/ActionLink"
        next:
          $ref: "#/components/schemas/ActionLink"
        prev:
          $ref: "#/components/schemas/ActionLink"
        create_child_collection:
          $ref: "#/components/schemas/ActionLink"
        create_child_data_object:
          $ref: "#/components/schemas/ActionLink"
        upload_contents:
          $ref: "#/components/schemas/ActionLink"
    PathReplicasLinks:
      type: object
      properties:
        self:
          $ref: "#/components/schemas/ActionLink"
        add_replica:
          $ref: "#/components/schemas/ActionLink"
        move_replica:
          $ref: "#/components/schemas/ActionLink"
        trim_replica:
          $ref: "#/components/schemas/ActionLink"
    PathReplicaLinks:
      type: object
      properties:
        trim:
          $ref: "#/components/schemas/ActionLink"
        resource_details:
          $ref: "#/components/schemas/ActionLink"
    PathChildrenResponse:
      type: object
      required: [irods_path, path_segments, children]
      properties:
        irods_path:
          type: string
        path_segments:
          type: array
          description: Ordered collection path segments for the requested collection, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        links:
          $ref: "#/components/schemas/PathChildrenLinks"
        children:
          type: array
          items:
            $ref: "#/components/schemas/PathEntry"
        search:
          $ref: "#/components/schemas/PathChildrenSearchMetadata"
    PathChildrenSearchMetadata:
      type: object
      properties:
        name_pattern:
          type: string
        recursive:
          type: boolean
        search_scope:
          type: string
          enum: [children, subtree, absolute]
        case_sensitive:
          type: boolean
        matched_count:
          type: integer
          minimum: 0
    PathReplicasResponse:
      type: object
      required: [irods_path, path_segments, replicas]
      properties:
        irods_path:
          type: string
        path_segments:
          type: array
          description: Ordered collection path segments for the requested data object, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        links:
          $ref: "#/components/schemas/PathReplicasLinks"
        replicas:
          type: array
          items:
            $ref: "#/components/schemas/PathReplica"
    PathACLResponse:
      type: object
      required: [irods_path, kind, path_segments, users, groups]
      properties:
        irods_path:
          type: string
        kind:
          type: string
          enum: [data_object, collection]
        inheritance_enabled:
          type: boolean
          description: Collection-only inheritance setting when available.
        path_segments:
          type: array
          description: Ordered collection path segments for the requested path, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        links:
          $ref: "#/components/schemas/PathACLLinks"
        users:
          type: array
          items:
            $ref: "#/components/schemas/PathACLEntry"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/PathACLEntry"
    PathACLLinks:
      type: object
      properties:
        path:
          $ref: "#/components/schemas/ActionLink"
        add_user:
          $ref: "#/components/schemas/ActionLink"
        set_inheritance:
          $ref: "#/components/schemas/ActionLink"
    PathACLEntry:
      type: object
      required: [id, name, type, access_level]
      properties:
        id:
          type: string
          description: Stable ACL entry identifier for follow-up update or remove links.
        name:
          type: string
          description: iRODS user or group name.
        zone:
          type: string
          description: iRODS zone for the user or group when supplied by iRODS.
        type:
          type: string
          enum: [user, group]
          description: Principal kind derived from the iRODS user type.
        irods_user_type:
          type: string
          description: Raw iRODS user type returned with the ACL entry.
        access_level:
          type: string
          description: Raw iRODS access level for the path.
        links:
          $ref: "#/components/schemas/PathACLItemLinks"
    PathACLItemLinks:
      type: object
      properties:
        update:
          $ref: "#/components/schemas/ActionLink"
        remove:
          $ref: "#/components/schemas/ActionLink"
    PathACLCreateRequest:
      type: object
      required: [name, access_level]
      properties:
        name:
          type: string
          description: iRODS user or group principal name.
        zone:
          type: string
          description: iRODS zone for the principal. Defaults to configured zone.
        type:
          type: string
          enum: [user, group]
          description: Principal kind. Defaults to `user`.
        access_level:
          type: string
          description: Target iRODS ACL access level.
        recursive:
          type: boolean
          default: false
          description: Apply ACL change recursively when target path is a collection.
    PathACLUpdateRequest:
      type: object
      required: [access_level]
      properties:
        access_level:
          type: string
          description: Target iRODS ACL access level.
        recursive:
          type: boolean
          default: false
          description: Apply ACL change recursively when target path is a collection.
    PathACLInheritanceUpdateRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: When true enables inheritance, when false disables inheritance.
        recursive:
          type: boolean
          default: false
          description: Apply inheritance toggle recursively to nested collections.
    PathACLEntryResponse:
      type: object
      required: [irods_path, acl]
      properties:
        irods_path:
          type: string
        acl:
          $ref: "#/components/schemas/PathACLEntry"
    PathAVUResponse:
      type: object
      required: [irods_path, path_segments, avus]
      properties:
        irods_path:
          type: string
        path_segments:
          type: array
          description: Ordered collection path segments for the requested path, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        links:
          $ref: "#/components/schemas/PathLinks"
        avus:
          type: array
          items:
            $ref: "#/components/schemas/AVUMetadata"
        count:
          type: integer
          description: Number of AVUs returned after filtering and pagination.
        total:
          type: integer
          description: Number of AVUs matching the filter before pagination.
        offset:
          type: integer
          description: Number of matching AVUs skipped before returning results.
        limit:
          type: integer
          description: Requested page size, or 0 when no limit was requested.
    PathAVUSingleResponse:
      type: object
      required: [irods_path, path_segments, avu]
      properties:
        irods_path:
          type: string
        path_segments:
          type: array
          description: Ordered collection path segments for the requested path, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        avu:
          $ref: "#/components/schemas/AVUMetadata"
    PathChildCreateRequest:
      type: object
      required: [child_name, kind]
      properties:
        child_name:
          type: string
          description: Relative child name or relative nested path to create under the parent collection.
        kind:
          type: string
          enum: [collection, data_object]
        mkdirs:
          type: boolean
          default: false
          description: When `true`, create intermediate collection segments for collection creation.
    PathMoveRequest:
      type: object
      properties:
        operation:
          type: string
          enum: [move, copy]
          default: move
          description: Path mutation operation. Defaults to `move` when omitted.
        new_name:
          type: string
          description: New basename for rename/move within the same parent collection.
        destination_path:
          type: string
          description: Absolute destination iRODS path for move or copy operations.
      anyOf:
        - required: [new_name]
        - required: [destination_path]
    PathReplicaCreateRequest:
      type: object
      required: [resource]
      properties:
        resource:
          type: string
          description: Destination resource name to replicate to.
        update:
          type: boolean
          default: false
          description: When true, overwrite an existing destination replica if needed.
    PathReplicaMoveRequest:
      type: object
      required: [source_resource, destination_resource]
      properties:
        source_resource:
          type: string
          description: Source resource name to trim after destination replication.
        destination_resource:
          type: string
          description: Destination resource name to receive the replica.
        update:
          type: boolean
          default: false
          description: When true, allow updating an existing destination replica.
        min_copies:
          type: integer
          minimum: 0
          description: Minimum replicas to preserve during source trim. When omitted, the service uses `ReplicaTrimMinCopies` from configuration.
        min_age_minutes:
          type: integer
          minimum: 0
          description: Minimum age threshold in minutes for trim eligibility. When omitted, the service uses `ReplicaTrimMinAgeMinutes` from configuration.
    PathReplicaTrimRequest:
      type: object
      properties:
        resource:
          type: string
          description: Resource name of the replica to trim.
        replica_number:
          type: integer
          format: int64
          description: Replica number to trim when resource is not provided.
        min_copies:
          type: integer
          minimum: 0
          description: Minimum replicas to preserve after trim. When omitted, the service uses `ReplicaTrimMinCopies` from configuration.
        min_age_minutes:
          type: integer
          minimum: 0
          description: Minimum age threshold in minutes for trim eligibility. When omitted, the service uses `ReplicaTrimMinAgeMinutes` from configuration.
      anyOf:
        - required: [resource]
        - required: [replica_number]
    PathAVUCreateRequest:
      type: object
      required: [attrib, value]
      properties:
        attrib:
          type: string
        value:
          type: string
        unit:
          type: string
    PathChecksum:
      type: object
      properties:
        checksum:
          type: string
        type:
          type: string
          description: Checksum type prefix such as `sha2` or `md5`.
    PathChecksumResponse:
      type: object
      required: [irods_path, path_segments]
      properties:
        irods_path:
          type: string
        path_segments:
          type: array
          description: Ordered collection path segments for the requested data object, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        checksum:
          type: string
        type:
          type: string
          description: Checksum type prefix such as `sha2` or `md5`.
    AVUMetadata:
      type: object
      required: [id, attrib, value]
      properties:
        id:
          type: string
          description: Generic identifier for the AVU row as returned by iRODS.
        attrib:
          type: string
          description: AVU attribute name.
        value:
          type: string
          description: AVU value.
        unit:
          type: string
          description: Optional AVU units value.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        links:
          $ref: "#/components/schemas/AVULinks"
    AVULinks:
      type: object
      properties:
        update:
          $ref: "#/components/schemas/ActionLink"
        delete:
          $ref: "#/components/schemas/ActionLink"
    ActionLink:
      type: object
      required: [href]
      properties:
        href:
          type: string
        method:
          type: string
    PathSegmentLink:
      type: object
      required: [display_name, irods_path, href]
      properties:
        display_name:
          type: string
          description: Human-readable segment name for one level of the collection path.
        irods_path:
          type: string
          description: Canonical iRODS path up to this segment.
        href:
          type: string
          description: Relative REST link for displaying this collection level.
    PathContentsUploadRequest:
      type: object
      required: [parent_path, file_name, content]
      properties:
        parent_path:
          type: string
          description: Absolute iRODS collection path that will contain the uploaded object.
          example: /tempZone/home/alice/project
        file_name:
          type: string
          description: Target data object name within `parent_path`.
          example: sample.fastq.gz
        content:
          type: string
          format: binary
          description: Complete binary payload for the uploaded object.
        checksum:
          type: boolean
          default: false
          description: |
            When true, request checksum calculation or verification during upload.
            Future implementations may apply per-user saved defaults when this field
            is omitted, but explicit request values override saved defaults.
        overwrite:
          type: boolean
          default: false
          description: |
            When true, allow replacement of an existing object at the resolved path.
            Future implementations may apply per-user saved defaults when this field
            is omitted, but explicit request values override saved defaults.
    PathContentsUploadResponse:
      type: object
      required: [path, parent_path, file_name, action, size, links]
      properties:
        path:
          type: string
          description: Resolved canonical iRODS object path.
