openapi: 3.0.3
info:
  title: iRODS REST API
  version: 0.1.0
  description: |
    REST-ful iRODS running on GoLang.
servers:
  - url: http://localhost:8080
tags:
  - name: health
  - name: path
paths:
  /healthz:
    get:
      operationId: getHealth
      tags: [health]
      summary: Health probe
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/resource:
    get:
      operationId: getResources
      tags: [path]
      summary: List resource servers in the configured iRODS zone
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: scope
          required: false
          schema:
            type: string
            enum: [top, all]
            default: top
          description: |
            Resource listing scope. `top` is the default view intended for top-level
            resources. `all` returns the full visible flat resource set. The current
            backend resource model is flat, so these values are currently equivalent.
      responses:
        "200":
          description: Resource servers visible in the zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceCollectionResponse"
        "403":
          description: Access denied while listing resources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/resource/{resource_id}:
    get:
      operationId: getResource
      tags: [path]
      summary: Fetch details for one iRODS resource
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: resource_id
          required: true
          schema:
            type: string
          description: Resource identifier. This currently uses the iRODS resource name.
      responses:
        "200":
          description: Resource details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceResponse"
        "404":
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied while reading the resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/path:
    get:
      operationId: getPath
      tags: [path]
      summary: Fetch metadata for an iRODS logical path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a file or collection.
        - in: query
          name: verbose
          required: false
          schema:
            type: string
          description: |
            Optional verbosity level for replica details on data objects.
            `1`, `true`, or `long` includes `ils -l` style replica information.
            `2` or `very_long` includes `ils -L` style checksum, data type, and physical path details.
      responses:
        "200":
          description: Metadata for a file or collection path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathEntry"
        "400":
          description: Missing irods_path query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: postPath
      tags: [path]
      summary: Create a collection or zero-byte data object under a parent collection
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to the parent collection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathChildCreateRequest"
      responses:
        "201":
          description: Created collection or data object metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathEntry"
        "400":
          description: Missing path or invalid create request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Parent collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: patchPath
      tags: [path]
      summary: Rename a file or collection within its current parent collection
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to the existing file or collection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathMoveRequest"
      responses:
        "200":
          description: Metadata for the renamed path at its new location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathEntry"
        "400":
          description: Missing path or invalid rename request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Path not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePath
      tags: [path]
      summary: Delete a data object or collection path
      description: |
        Deletes the path identified by `irods_path`.
        Collections must be empty unless `force=true`, which performs a recursive delete.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a file or collection.
        - in: query
          name: force
          required: false
          schema:
            type: boolean
            default: false
          description: When `true`, bypass the empty-collection check and recursively delete collections.
      responses:
        "204":
          description: Path deleted
        "400":
          description: Missing path or invalid force query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Path not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Collection is not empty and force was not supplied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/path/children:
    get:
      operationId: getPathChildren
      tags: [path]
      summary: List direct children for a collection path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a collection.
      responses:
        "200":
          description: Collection children
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathChildrenResponse"
        "400":
          description: Missing irods_path query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Path not found or not a collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      deprecated: true
      operationId: postPathChildren
      tags: [path]
      summary: Compatibility alias for child creation under a collection path
      description: |
        Deprecated compatibility alias for `POST /api/v1/path`.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to the parent collection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathChildCreateRequest"
      responses:
        "201":
          description: Child collection or data object created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathEntry"
        "400":
          description: Missing parent path or invalid child request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Parent path not found or not a collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/path/actions/move:
    post:
      deprecated: true
      operationId: postPathMove
      tags: [path]
      summary: Compatibility alias for same-parent rename
      description: |
        Deprecated compatibility alias for `PATCH /api/v1/path`.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to the source file or collection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathMoveRequest"
      responses:
        "200":
          description: Renamed path entry at the new location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathEntry"
        "400":
          description: Missing path or invalid rename request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Path not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/path/avu:
    get:
      operationId: getPathAVUs
      tags: [path]
      summary: List AVUs for an iRODS logical path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a file or collection.
        - in: query
          name: attrib
          schema:
            type: string
          description: Exact AVU attribute name to include in the response.
        - in: query
          name: sort
          schema:
            type: string
            enum: [id, attrib, value, unit, created_at, updated_at]
          description: AVU field to sort by.
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort direction when sort is provided.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
          description: Maximum number of AVUs to return.
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of filtered AVUs to skip before returning results.
      responses:
        "200":
          description: AVUs for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathAVUResponse"
        "400":
          description: Missing irods_path query parameter or invalid list option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: postPathAVU
      tags: [path]
      summary: Add a single AVU to an iRODS logical path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a file or collection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathAVUCreateRequest"
      responses:
        "201":
          description: AVU created for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathAVUSingleResponse"
        "400":
          description: Missing irods_path query parameter or invalid JSON body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/path/avu/{avu_id}:
    put:
      operationId: putPathAVU
      tags: [path]
      summary: Update a single AVU on an iRODS logical path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: avu_id
          required: true
          schema:
            type: string
          description: AVU identifier returned by the AVU listing endpoint.
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a file or collection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathAVUCreateRequest"
      responses:
        "200":
          description: AVU updated for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathAVUSingleResponse"
        "400":
          description: Missing irods_path query parameter, invalid AVU identifier, or invalid JSON body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object or AVU not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePathAVU
      tags: [path]
      summary: Delete a single AVU from an iRODS logical path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: avu_id
          required: true
          schema:
            type: string
          description: AVU identifier returned by the AVU listing endpoint.
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a file or collection.
      responses:
        "204":
          description: AVU deleted
        "400":
          description: Missing irods_path query parameter or invalid AVU identifier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object or AVU not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/path/checksum:
    get:
      operationId: getPathChecksum
      tags: [path]
      summary: Fetch the current stored checksum for a data object path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a data object.
      responses:
        "200":
          description: Current checksum information for the requested data object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathChecksumResponse"
        "400":
          description: Missing irods_path query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object not found or not a data object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: postPathChecksum
      tags: [path]
      summary: Compute and store the checksum for a data object path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a data object.
      responses:
        "200":
          description: Newly computed checksum information for the requested data object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathChecksumResponse"
        "400":
          description: Missing irods_path query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object not found or not a data object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/path/contents:
    head:
      operationId: headPathContents
      tags: [path]
      summary: Inspect content headers for bytes at an iRODS logical path
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a file.
        - in: query
          name: ticket_id
          required: false
          schema:
            type: string
          description: |
            Optional iRODS ticket name for anonymous access. When supplied, this
            takes precedence over any bearer token and allows browser-friendly
            ticketed downloads without an `Authorization` header.
        - in: header
          name: Range
          required: false
          schema:
            type: string
          description: Optional byte range request in RFC 9110 format, currently single-range only.
      responses:
        "200":
          description: Content headers for the full object
        "206":
          description: Content headers for a byte range
        "400":
          description: Missing irods_path query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "416":
          description: Invalid byte range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: getPathContents
      tags: [path]
      summary: Stream bytes for an iRODS logical path
      description: |
        Accepts Basic auth, an OAuth bearer token, or a bearer token prefixed as `irods-ticket:<ticket>`.
        Optionally accepts `ticket_id` as a query parameter, which takes precedence
        over any bearer ticket and supports anonymous browser download links.
        Supports single-range byte restarts via the `Range` header.
        Responses include download-oriented headers such as `Content-Disposition`,
        `Last-Modified`, `ETag` when a checksum is already stored, and
        `X-Content-Type-Options: nosniff`.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path to a file.
        - in: query
          name: ticket_id
          required: false
          schema:
            type: string
          description: |
            Optional iRODS ticket name for anonymous access. When supplied, this
            takes precedence over any bearer token and allows browser-friendly
            ticketed downloads without an `Authorization` header.
        - in: header
          name: Range
          required: false
          schema:
            type: string
          description: Optional byte range request in RFC 9110 format, currently single-range only.
      responses:
        "200":
          description: Full object bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: Partial object bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          description: Missing irods_path query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "416":
          description: Invalid byte range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: postPathContents
      tags: [path]
      summary: Upload a data object into a collection path
      description: |
        Uploads a complete object using `multipart/form-data`.

        The client specifies the target parent collection and child file name as
        separate form fields. The server resolves the canonical iRODS object path
        as `parent_path + "/" + file_name`.

        Initial contract scope is whole-object upload only. Resumable upload and
        chunk restart behavior are intentionally deferred to a future upload-session
        design rather than overloading this operation with partial-write semantics.

        Future server implementations may apply per-user saved defaults from the
        user's iRODS home configuration, but explicit request values must take
        precedence over saved defaults.
      security:
        - BearerAuth: []
        - BasicAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PathContentsUploadRequest"
            encoding:
              content:
                contentType: application/octet-stream
      responses:
        "201":
          description: Object created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathContentsUploadResponse"
        "200":
          description: Existing object replaced because overwrite was enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathContentsUploadResponse"
        "400":
          description: Missing multipart fields or invalid parameter values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Parent collection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Target object already exists and overwrite is not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "415":
          description: Request must use multipart/form-data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Unexpected server-side failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/path/ticket:
    post:
      operationId: postPathTicket
      tags: [ticket]
      summary: Create an anonymous read ticket for an iRODS path
      description: |
        Creates an anonymous read ticket scoped to the supplied `irods_path`.
        The response includes the raw ticket name, a bearer token formatted as
        `irods-ticket:<ticket>`, ticket restriction values, and HATEOAS links.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: query
          name: irods_path
          required: true
          schema:
            type: string
          description: Full iRODS absolute logical path for the ticket target.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketCreateRequest"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "400":
          description: Missing irods_path or invalid ticket parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/ticket:
    get:
      operationId: getTickets
      tags: [ticket]
      summary: List tickets owned by the authenticated iRODS user
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        "200":
          description: Ticket list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketCollectionResponse"
        "401":
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: postTicket
      tags: [ticket]
      summary: Create an anonymous read ticket for a supplied iRODS path
      security:
        - BearerAuth: []
        - BasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/TicketCreateRequest"
                - type: object
                  required: [irods_path]
                  properties:
                    irods_path:
                      type: string
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "400":
          description: Missing irods_path or invalid ticket parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied for the requested path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Path not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/ticket/{ticket_name}:
    get:
      operationId: getTicket
      tags: [ticket]
      summary: Show one ticket by ticket name
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: ticket_name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "401":
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: patchTicket
      tags: [ticket]
      summary: Update mutable ticket restrictions
      description: |
        `maximum_uses: 0` clears the use limit.
        `lifetime_minutes: 0` clears the expiration time.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: ticket_name
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketUpdateRequest"
      responses:
        "200":
          description: Ticket updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "400":
          description: Invalid request body or parameter values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteTicket
      tags: [ticket]
      summary: Delete a ticket by ticket name
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: path
          name: ticket_name
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Ticket deleted
        "401":
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    HealthResponse:
      type: object
      required: [status, service, environment]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: iRODS REST API
        environment:
          type: string
          example: development
    PathEntry:
      type: object
      required: [id, path, kind, zone, path_segments]
      properties:
        id:
          type: string
        path:
          type: string
        kind:
          type: string
          enum: [data_object, collection]
        links:
          $ref: "#/components/schemas/PathLinks"
        parent:
          $ref: "#/components/schemas/ParentLink"
        path_segments:
          type: array
          description: Ordered collection path segments for the path resource, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        hasChildren:
          type: boolean
        childCount:
          type: integer
          format: int32
        checksum:
          $ref: "#/components/schemas/PathChecksum"
        mime_type:
          type: string
          description: Inferred MIME type for a data object, based on the logical path extension.
        size:
          type: integer
          format: int64
        display_size:
          type: string
          description: Human-readable size formatted automatically as B, KB, MB, or GB.
        zone:
          type: string
        resource:
          type: string
        resource_link:
          $ref: "#/components/schemas/ActionLink"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        replicas:
          type: array
          items:
            $ref: "#/components/schemas/PathReplica"
        metadata:
          type: object
          additionalProperties:
            type: string
    PathReplica:
      type: object
      required: [number]
      properties:
        number:
          type: integer
          format: int64
        owner:
          type: string
        resource_name:
          type: string
        resource_link:
          $ref: "#/components/schemas/ActionLink"
        resource_hierarchy:
          type: string
        size:
          type: integer
          format: int64
        display_size:
          type: string
        updated_at:
          type: string
          format: date-time
        status:
          type: string
          description: Raw iRODS replica status value.
        status_symbol:
          type: string
          description: ils-style replica status indicator such as `&`, `X`, or `?`.
        status_description:
          type: string
          description: Human-readable interpretation of the replica status.
        checksum:
          type: string
        data_type:
          type: string
        physical_path:
          type: string
    PathLinks:
      type: object
      properties:
        avus:
          $ref: "#/components/schemas/ActionLink"
        create_avu:
          $ref: "#/components/schemas/ActionLink"
        create_ticket:
          $ref: "#/components/schemas/ActionLink"
        resources:
          $ref: "#/components/schemas/ActionLink"
        create_child_collection:
          $ref: "#/components/schemas/ActionLink"
        create_child_data_object:
          $ref: "#/components/schemas/ActionLink"
    ParentLink:
      type: object
      required: [irods_path, href]
      properties:
        irods_path:
          type: string
        href:
          type: string
    PathChildrenResponse:
      type: object
      required: [irods_path, path_segments, children]
      properties:
        irods_path:
          type: string
        path_segments:
          type: array
          description: Ordered collection path segments for the requested collection, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        children:
          type: array
          items:
            $ref: "#/components/schemas/PathEntry"
    PathAVUResponse:
      type: object
      required: [irods_path, path_segments, avus]
      properties:
        irods_path:
          type: string
        path_segments:
          type: array
          description: Ordered collection path segments for the requested path, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        links:
          $ref: "#/components/schemas/PathLinks"
        avus:
          type: array
          items:
            $ref: "#/components/schemas/AVUMetadata"
        count:
          type: integer
          description: Number of AVUs returned after filtering and pagination.
        total:
          type: integer
          description: Number of AVUs matching the filter before pagination.
        offset:
          type: integer
          description: Number of matching AVUs skipped before returning results.
        limit:
          type: integer
          description: Requested page size, or 0 when no limit was requested.
    PathAVUSingleResponse:
      type: object
      required: [irods_path, path_segments, avu]
      properties:
        irods_path:
          type: string
        path_segments:
          type: array
          description: Ordered collection path segments for the requested path, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        avu:
          $ref: "#/components/schemas/AVUMetadata"
    PathChildCreateRequest:
      type: object
      required: [child_name, kind]
      properties:
        child_name:
          type: string
          description: Relative child name or relative nested path to create under the parent collection.
        kind:
          type: string
          enum: [collection, data_object]
        mkdirs:
          type: boolean
          default: false
          description: When `true`, create intermediate collection segments for collection creation.
    PathMoveRequest:
      type: object
      required: [new_name]
      properties:
        new_name:
          type: string
          description: New basename for the file or collection within the same parent collection.
    PathAVUCreateRequest:
      type: object
      required: [attrib, value]
      properties:
        attrib:
          type: string
        value:
          type: string
        unit:
          type: string
    PathChecksum:
      type: object
      properties:
        checksum:
          type: string
        type:
          type: string
          description: Checksum type prefix such as `sha2` or `md5`.
    PathChecksumResponse:
      type: object
      required: [irods_path, path_segments]
      properties:
        irods_path:
          type: string
        path_segments:
          type: array
          description: Ordered collection path segments for the requested data object, each with a display name and HATEOAS link.
          items:
            $ref: "#/components/schemas/PathSegmentLink"
        checksum:
          type: string
        type:
          type: string
          description: Checksum type prefix such as `sha2` or `md5`.
    AVUMetadata:
      type: object
      required: [id, attrib, value]
      properties:
        id:
          type: string
          description: Generic identifier for the AVU row as returned by iRODS.
        attrib:
          type: string
          description: AVU attribute name.
        value:
          type: string
          description: AVU value.
        unit:
          type: string
          description: Optional AVU units value.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        links:
          $ref: "#/components/schemas/AVULinks"
    AVULinks:
      type: object
      properties:
        update:
          $ref: "#/components/schemas/ActionLink"
        delete:
          $ref: "#/components/schemas/ActionLink"
    ActionLink:
      type: object
      required: [href]
      properties:
        href:
          type: string
        method:
          type: string
    PathSegmentLink:
      type: object
      required: [display_name, irods_path, href]
      properties:
        display_name:
          type: string
          description: Human-readable segment name for one level of the collection path.
        irods_path:
          type: string
          description: Canonical iRODS path up to this segment.
        href:
          type: string
          description: Relative REST link for displaying this collection level.
    PathContentsUploadRequest:
      type: object
      required: [parent_path, file_name, content]
      properties:
        parent_path:
          type: string
          description: Absolute iRODS collection path that will contain the uploaded object.
          example: /tempZone/home/alice/project
        file_name:
          type: string
          description: Target data object name within `parent_path`.
          example: sample.fastq.gz
        content:
          type: string
          format: binary
          description: Complete binary payload for the uploaded object.
        checksum:
          type: boolean
          default: false
          description: |
            When true, request checksum calculation or verification during upload.
            Future implementations may apply per-user saved defaults when this field
            is omitted, but explicit request values override saved defaults.
        overwrite:
          type: boolean
          default: false
          description: |
            When true, allow replacement of an existing object at the resolved path.
            Future implementations may apply per-user saved defaults when this field
            is omitted, but explicit request values override saved defaults.
    PathContentsUploadResponse:
      type: object
      required: [path, parent_path, file_name, action, size, links]
      properties:
        path:
          type: string
          description: Resolved canonical iRODS object path.
          example: /tempZone/home/alice/project/sample.fastq.gz
        parent_path:
          type: string
          description: Canonical parent collection path that received the uploaded object.
          example: /tempZone/home/alice/project
        file_name:
          type: string
          description: Uploaded data object name.
          example: sample.fastq.gz
        action:
          type: string
          enum: [created, replaced]
          description: Indicates whether the upload created a new object or replaced an existing object.
        size:
          type: integer
          format: int64
          description: Uploaded object size in bytes.
        checksum:
          $ref: "#/components/schemas/UploadChecksumInfo"
        links:
          $ref: "#/components/schemas/PathContentsUploadLinks"
    UploadChecksumInfo:
      type: object
      required: [requested, verified]
      properties:
        requested:
          type: boolean
          description: True when the request explicitly asked for checksum handling.
        verified:
          type: boolean
          description: True when checksum processing was completed by the server.
        algorithm:
          type: string
          description: Checksum algorithm used by the server when checksum processing was completed.
          example: sha2
        value:
          type: string
          description: Calculated or verified checksum value.
          example: 9d4e1e23bd5b727046a9e3b4b7db57bd8d6ee684
    PathContentsUploadLinks:
      type: object
      required: [path, contents, parent]
      properties:
        path:
          $ref: "#/components/schemas/ResourceLink"
        contents:
          $ref: "#/components/schemas/ResourceLink"
        parent:
          $ref: "#/components/schemas/ResourceLink"
    ResourceLink:
      type: object
      required: [href]
      properties:
        href:
          type: string
          description: Relative REST link for the related resource.
    Resource:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        zone:
          type: string
        type:
          type: string
        class:
          type: string
        location:
          type: string
        path:
          type: string
        context:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        links:
          $ref: "#/components/schemas/ResourceLinks"
    ResourceLinks:
      type: object
      properties:
        self:
          $ref: "#/components/schemas/ActionLink"
    ResourceResponse:
      type: object
      required: [resource]
      properties:
        resource:
          $ref: "#/components/schemas/Resource"
    ResourceCollectionResponse:
      type: object
      required: [resources, count, scope, links]
      properties:
        resources:
          type: array
          items:
            $ref: "#/components/schemas/Resource"
        count:
          type: integer
        scope:
          type: string
          enum: [top, all]
        links:
          type: object
          properties:
            self:
              $ref: "#/components/schemas/ActionLink"
    Ticket:
      type: object
      required: [name]
      properties:
        name:
          type: string
        bearer_token:
          type: string
        type:
          type: string
        owner:
          type: string
        owner_zone:
          type: string
        object_type:
          type: string
        irods_path:
          type: string
        uses_limit:
          type: integer
          format: int64
        uses_count:
          type: integer
          format: int64
        write_file_limit:
          type: integer
          format: int64
        write_file_count:
          type: integer
          format: int64
        write_byte_limit:
          type: integer
          format: int64
        write_byte_count:
          type: integer
          format: int64
        expiration_time:
          type: string
          format: date-time
        links:
          $ref: "#/components/schemas/TicketLinks"
    TicketLinks:
      type: object
      properties:
        self:
          $ref: "#/components/schemas/ActionLink"
        update:
          $ref: "#/components/schemas/ActionLink"
        delete:
          $ref: "#/components/schemas/ActionLink"
        path:
          $ref: "#/components/schemas/ActionLink"
        download:
          $ref: "#/components/schemas/ActionLink"
    TicketCreateRequest:
      type: object
      properties:
        maximum_uses:
          type: integer
          format: int64
          minimum: 0
        lifetime_minutes:
          type: integer
          minimum: 0
    TicketUpdateRequest:
      type: object
      properties:
        maximum_uses:
          type: integer
          format: int64
          minimum: 0
        lifetime_minutes:
          type: integer
          minimum: 0
    TicketResponse:
      type: object
      required: [ticket]
      properties:
        ticket:
          $ref: "#/components/schemas/Ticket"
    TicketCollectionResponse:
      type: object
      required: [tickets, count, links]
      properties:
        tickets:
          type: array
          items:
            $ref: "#/components/schemas/Ticket"
        count:
          type: integer
        links:
          type: object
          properties:
            self:
              $ref: "#/components/schemas/ActionLink"
            create:
              $ref: "#/components/schemas/ActionLink"
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        fields:
          type: object
          description: Optional field-level validation messages keyed by request field name.
          additionalProperties:
            type: string
